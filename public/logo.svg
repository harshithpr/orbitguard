<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OrbitGuard logo</title>
  <desc id="desc">A shield behind Earth with an orbital ring and satellite dot.</desc>
  <defs>
    <linearGradient id="shield" x1="104" y1="64" x2="408" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.52" stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="earth" x1="174" y1="155" x2="340" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.56" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#020617"/>
  <path
    d="M256 48 392 96v116c0 108-55 198-136 252-81-54-136-144-136-252V96l136-48Z"
    fill="url(#shield)"
    stroke="#1e293b"
    stroke-width="16"
  />

  <ellipse
    cx="256"
    cy="256"
    rx="188"
    ry="68"
    fill="none"
    stroke="#38bdf8"
    stroke-width="13"
    stroke-linecap="round"
    transform="rotate(-18 256 256)"
    opacity="0.95"
  />
  <ellipse
    cx="256"
    cy="256"
    rx="190"
    ry="70"
    fill="none"
    stroke="#22c55e"
    stroke-width="5"
    stroke-linecap="round"
    transform="rotate(-18 256 256)"
    opacity="0.78"
  />

  <circle cx="256" cy="256" r="88" fill="url(#earth)" stroke="#e0f2fe" stroke-width="8"/>
  <path d="M196 234c33-21 75-30 120-16 16 5 29 13 40 23-7-43-43-73-89-73-39 0-72 26-84 62 4 3 8 4 13 4Z" fill="#7dd3fc" opacity="0.52"/>
  <path d="M207 295c28 22 75 31 118 11 20-9 35-23 45-40-2 46-40 83-89 83-36 0-68-21-84-52 3-1 6-2 10-2Z" fill="#22c55e" opacity="0.45"/>

  <circle cx="381" cy="186" r="17" fill="#f8fafc" filter="url(#glow)"/>
  <circle cx="381" cy="186" r="7" fill="#22c55e"/>
  <path d="M363 176 346 159M399 196l17 17" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
</svg>

